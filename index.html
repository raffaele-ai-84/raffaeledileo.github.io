<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Raffaele Di Leo | AI Engineer</title>
  <style>
    /* RESET E BASE STILI */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; font-family:Consolas, monospace; }
    html { scroll-behavior:smooth; }
    body { background:#0a0a0f; color:#fff; overflow-x:hidden; line-height:1.6; }

    /* PARTICLE BACKGROUND */
    #network { position:fixed; top:0; left:0; width:100%; height:100%; z-index:-1; }

    /* SEZIONI GENERALI */
    section { padding:80px 5%; max-width:1200px; margin:auto; opacity:0; transform: translateY(50px); transition: all 0.8s ease-out; }
    section.visible { opacity:1; transform: translateY(0); }

    h1 { font-size:2.8rem; background:linear-gradient(90deg,#00f5ff,#7b2ff7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-align:center; }
    h2 { color:#00f5ff; margin-bottom:20px; text-align:center; }

    /* HERO SECTION */
    .hero { display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; text-align:center; gap:20px; }
    .typing { font-size:1.2rem; color:#aaa; min-height:1.5em; }
    .btn { display:inline-block; padding:12px 28px; border:1px solid #00f5ff; color:#00f5ff; text-decoration:none; margin:10px; transition:0.3s; border-radius:6px; }
    .btn:hover { background:#00f5ff; color:#000; box-shadow:0 0 20px #00f5ff; }

    /* ABOUT */
    .about p { max-width:800px; margin:0 auto; text-align:center; font-size:1rem; }

    /* TERMINAL */
    .terminal { background:#111; padding:20px; border:1px solid #00f5ff; border-radius:8px; margin-top:20px; min-height:200px; font-size:0.95rem; }
    .terminal-line { margin-bottom:10px; color:#00ff88; opacity:0; transform: translateX(-20px); transition: all 0.5s ease-out; }

    /* PROJECT GRID */
    .project-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(250px,1fr)); gap:20px; margin-top:20px; }
    .card { background:#141414; padding:20px; border:1px solid #222; border-radius:8px; opacity:0; transform: translateY(30px); transition: all 0.6s ease-out; }
    .card.visible { opacity:1; transform: translateY(0); }
    .card h3 { margin-bottom:10px; color:#00f5ff; }

    /* FOOTER */
    footer { text-align:center; padding:30px 0; opacity:0.6; font-size:0.9rem; }

    /* RESPONSIVE */
    @media(max-width:768px){ h1{font-size:2rem;} .typing{font-size:1rem;} }
  </style>
</head>
<body>

  <!-- PARTICLE BACKGROUND -->
  <canvas id="network"></canvas>

  <!-- HERO -->
  <section class="hero">
    <h1>AI Infrastructure Engineer</h1>
    <div class="typing" id="typing"></div>
    <div>
      <a href="#projects" class="btn">View Projects</a>
      <a href="cv.pdf" class="btn" download>Download CV</a>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="about">
    <h2>About</h2>
    <p>
      System Administrator evoluto in AI Engineer. Progetto infrastrutture intelligenti, integro modelli generativi
      e automatizzo pipeline operative con approccio data-driven.
    </p>
  </section>

  <!-- TERMINAL -->
  <section>
    <h2>Terminal</h2>
    <div class="terminal" id="terminal"></div>
  </section>

  <!-- PROJECTS -->
  <section id="projects">
    <h2>Projects</h2>
    <div class="project-grid" id="projectGrid"></div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 Raffaele Di Leo — AI Driven Systems
  </footer>

  <script>
    /* TYPING EFFECT */
    const text = "AI Automation | Generative Systems | Infrastructure Optimization";
    let i = 0;
    function typing() {
      if(i<text.length){
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typing,40);
      }
    }
    typing();

    /* DYNAMIC PROJECTS */
    const projects = [
      { title:"AI Workflow Lab", desc:"Pipeline generative locali ottimizzate GPU." },
      { title:"Infrastructure AI Monitoring", desc:"Monitoraggio predittivo con modelli ML." },
      { title:"Automation Engine", desc:"Script e orchestrazioni per ambienti enterprise." }
    ];
    const grid=document.getElementById("projectGrid");
    projects.forEach(p=>{
      const card=document.createElement("div");
      card.className="card";
      card.innerHTML=`<h3>${p.title}</h3><p>${p.desc}</p>`;
      grid.appendChild(card);
    });

    /* PARTICLE NETWORK */
    const canvas=document.getElementById("network");
    const ctx=canvas.getContext("2d");
    function resizeCanvas(){ canvas.width=window.innerWidth; canvas.height=window.innerHeight; }
    window.addEventListener('resize',resizeCanvas);
    resizeCanvas();
    let particles=[];
    for(let i=0;i<80;i++){
      particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, vx:(Math.random()-0.5)*0.5, vy:(Math.random()-0.5)*0.5});
    }
    function draw(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      particles.forEach(p=>{
        p.x+=p.vx; p.y+=p.vy;
        ctx.beginPath();
        ctx.arc(p.x,p.y,2,0,Math.PI*2);
        ctx.fillStyle="#00f5ff"; ctx.fill();
      });
      for(let a=0;a<particles.length;a++){
        for(let b=a;b<particles.length;b++){
          let dx=particles[a].x-particles[b].x;
          let dy=particles[a].y-particles[b].y;
          let dist=Math.sqrt(dx*dx+dy*dy);
          if(dist<120){
            ctx.beginPath();
            ctx.moveTo(particles[a].x,particles[a].y);
            ctx.lineTo(particles[b].x,particles[b].y);
            ctx.strokeStyle="rgba(0,245,255,0.1)";
            ctx.stroke();
          }
        }
      }
      requestAnimationFrame(draw);
    }
    draw();

    /* TERMINAL SEQUENZIALE */
    const terminalLines = [
      "Booting AI Core...",
      "Loading neural modules...",
      "Optimizing infrastructure...",
      "System ready."
    ];
    const terminalDiv = document.getElementById('terminal');
    function showTerminalLine(index){
      if(index<terminalLines.length){
        const line = document.createElement("div");
        line.className="terminal-line";
        line.textContent="> "+terminalLines[index];
        terminalDiv.appendChild(line);
        // sequenziale fade-in
        setTimeout(()=>{line.style.opacity=1; line.style.transform="translateX(0)";},50);
        setTimeout(()=>showTerminalLine(index+1),400);
      }
    }

    // avvia terminal sequenziale quando entra in viewport
    const terminalObserver = new IntersectionObserver(entries=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){ showTerminalLine(0); terminalObserver.unobserve(entry.target); }
      });
    }, {threshold:0.3});
    terminalObserver.observe(terminalDiv);

    /* CARDS SEQUENZIALI */
    const cardObserver = new IntersectionObserver(entries=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          const cards = entry.target.querySelectorAll('.card');
          cards.forEach((c,i)=>setTimeout(()=>c.classList.add('visible'), i*200));
          cardObserver.unobserve(entry.target);
        }
      });
    }, {threshold:0.3});
    cardObserver.observe(document.getElementById('projects'));

    /* SECTION GENERIC FADE-IN */
    const sectionObserver = new IntersectionObserver(entries=>{
      entries.forEach(entry=>{ if(entry.isIntersecting) entry.target.classList.add('visible'); });
    }, {threshold:0.2});
    document.querySelectorAll('section').forEach(s=>sectionObserver.observe(s));
  </script>
</body>
</html>
